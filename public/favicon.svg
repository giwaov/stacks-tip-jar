<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="jarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  
  <!-- Jar body -->
  <path d="M25 35 L25 80 Q25 90 35 90 L65 90 Q75 90 75 80 L75 35 Z" fill="url(#jarGrad)" opacity="0.9"/>
  
  <!-- Jar neck -->
  <rect x="30" y="25" width="40" height="12" rx="2" fill="url(#jarGrad)"/>
  
  <!-- Lid -->
  <rect x="28" y="18" width="44" height="10" rx="3" fill="url(#lidGrad)"/>
  
  <!-- Lid handle -->
  <rect x="42" y="12" width="16" height="8" rx="4" fill="url(#lidGrad)"/>
  
  <!-- Coins inside jar -->
  <ellipse cx="40" cy="70" rx="10" ry="5" fill="url(#coinGrad)"/>
  <ellipse cx="55" cy="65" rx="10" ry="5" fill="url(#coinGrad)"/>
  <ellipse cx="45" cy="58" rx="10" ry="5" fill="url(#coinGrad)"/>
  <ellipse cx="60" cy="75" rx="8" ry="4" fill="url(#coinGrad)"/>
  
  <!-- STX symbol on jar -->
  <text x="50" y="52" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold" font-size="14">STX</text>
  
  <!-- Glass shine -->
  <path d="M30 40 L30 75 Q30 80 32 80" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>
</svg>
